services:
    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        ports:
            - "${FRONTEND_PORT:-8081}:80"
        restart: unless-stopped

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - "3001:3001"
        env_file:
            - ./backend/.env
        environment:
            FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-8081}
            KNOWLEDGE_DIR: /app/knowledge
            PRIVATE_KNOWLEDGE_DIR: /app/private
            PYTHON_BIN: python3
        volumes:
            - ./frontend/knowledge:/app/knowledge:ro
            - ./backend/private:/app/private:ro
        restart: unless-stopped
